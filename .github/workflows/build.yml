name: Build firmware

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build UF2 artifacts
    uses: ./.github/workflows/build-firmware.yml
    with:
      version: ${{ github.sha }}   # reusable build shortens a full SHA to 7
      picow: true
      no_batt_led_check: true
